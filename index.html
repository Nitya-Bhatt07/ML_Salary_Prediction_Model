<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salary Predictor ✨</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e0c3fc, #f9f9ff);
    }

    .card {
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 40px;
      width: 320px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    h2 {
      color: #6b21a8;
      margin-bottom: 20px;
    }

    input {
      width: 85%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.4);
      color: #333;
    }

    input::placeholder {
      color: #666;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      color: #4c1d95;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="card">
  <h2>✨ Salary Predictor</h2>

  <input type="number" id="exp" placeholder="Years of experience" />

  <br>
  <button onclick="predictSalary()">Predict</button>

  <div class="result" id="result"></div>
</div>

<script>
  async function predictSalary() {
    let exp = document.getElementById("exp").value;

    if (!exp) {
      alert("Enter experience first 😤");
      return;
    }

    let response = await fetch(`https://salary-api3.onrender.com/predict?experience=${exp}`);
    let data = await response.json();

    document.getElementById("result").innerHTML =
      "💰 ₹ " + Math.round(data.salary);
  }
</script>

</body>
</html>
